name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run ci:verify

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH key
        run: |
          install -m 0700 -d ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add EC2 host key (best effort)
        run: |
          PORT="${{ secrets.EC2_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi
          ssh-keyscan -T 10 -p "$PORT" -H "${{ secrets.EC2_SSH_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Deploy on EC2
        run: |
          PORT="${{ secrets.EC2_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT="22"; fi
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -p "$PORT" "${{ secrets.EC2_SSH_USER }}@${{ secrets.EC2_SSH_HOST }}" \
            'cd /home/meepo/meepo-bot && ./deploy-meepo.sh main'
